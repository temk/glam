job_dir: ./jobs

# Optional job defaults; `init` uses these when the matching flag is omitted.
defaults:
  source: en
  target: ru
  # Default glossary path, used when --glossary is omitted. A per-run --glossary overrides it.
  # glossary: ./conf/glossary.local.txt

services:
  - name: transcribe
    protocol: openai
    url: http://<inference-host>:8000/v1
    params:
      model: Systran/faster-whisper-large-v3

  - name: translate
    protocol: openai
    url: http://<inference-host>:11434/v1
    params:
      model: qwen2.5:7b
      api_key: MY_SECRET_KEY
    # Optional side-effect HTTP calls around the step (e.g. load/unload the model on the GPU).
    # `pre` runs before the step's work (only when it actually runs), `post` runs after in a
    # `finally`. At least one of pre/post is required. `method` defaults to POST, `timeout` to 180s.
    # hooks:
    #   pre:
    #     url: http://<inference-host>:9090/v1/actions/prepare-translate
    #     timeout: 120
    #   post:
    #     url: http://<inference-host>:9090/v1/actions/release-translate
    #     timeout: 60

  # Native Chatterbox-TTS-Server: `url` is the server root, the backend appends `/tts`.
  # The target language is sent per request; a built-in default voice is used unless --voice or the
  # job's voice is set. Give voices without the `.wav` extension (e.g. `Michael`); the backend
  # appends `.wav` to form the server's predefined voice id.
  - name: tts
    protocol: chatterbox
    url: http://<inference-host>:8004

  # OpenAI-compatible TTS alternative. The OpenAI speech protocol requires a voice, so set a
  # default `voice` here or pass `--voice` per run.
  # - name: tts
  #   protocol: openai
  #   url: http://<inference-host>:PORT/v1
  #   params:
  #     model: xtts-v2
  #     voice: alloy
